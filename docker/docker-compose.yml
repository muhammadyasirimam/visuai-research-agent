version: '3.8'

services:
  visuai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/visuai_output
    environment:
      - VISUAI_LLM_PROVIDER=${VISUAI_LLM_PROVIDER:-openai}
      - VISUAI_LLM_API_KEY=${VISUAI_LLM_API_KEY}
      - VISUAI_DOMAIN=${VISUAI_DOMAIN:-general}
    restart: unless-stopped

  visuai-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    command: uvicorn visuai.api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
      - ./output:/app/visuai_output
    environment:
      - VISUAI_LLM_PROVIDER=${VISUAI_LLM_PROVIDER:-openai}
      - VISUAI_LLM_API_KEY=${VISUAI_LLM_API_KEY}
    restart: unless-stopped
